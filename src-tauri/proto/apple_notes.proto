syntax = "proto2";

package ciofecaforensics;

message Color {
  optional float red = 1;
  optional float green = 2;
  optional float blue = 3;
  optional float alpha = 4;
}

message AttachmentInfo {
  optional string attachmentIdentifier = 1;
  optional string typeUti = 2;
}

message Font {
  optional string fontName = 1;
  optional float pointSize = 2;
  optional int32 fontHints = 3;
}

message ParagraphStyle {
  optional int32 styleType = 1 [default = -1];
  optional int32 alignment = 2;
  optional int32 indentAmount = 4;
  optional Checklist checklist = 5;
  optional int32 blockquote = 8;
}

message Checklist {
  optional bytes uuid = 1;
  optional int32 done = 2;
}

message AttributeRun {
  optional int32 length = 1;
  optional ParagraphStyle paragraphStyle = 2;
  optional Font font = 3;
  optional int32 fontWeight = 5;
  optional int32 underlined = 6;
  optional int32 strikethrough = 7;
  optional int32 superscript = 8;
  optional string link = 9;
  optional Color color = 10;
  optional AttachmentInfo attachmentInfo = 12;
}

message Note {
  optional string noteText = 2;
  repeated AttributeRun attributeRun = 5;
}

message Document {
  optional int32 version = 2;
  optional Note note = 3;
}
